<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Question Bank — Introduction to Computer Science</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --surface2: #F0EFE9;
  --border: #E2E0D8;
  --border2: #CCCAB8;
  --text-primary: #1A1916;
  --text-secondary: #6B6960;
  --text-tertiary: #9B9A93;
  --accent: #2B5C8A;
  --accent-light: #EBF1F8;
  --accent-mid: #B8CCE0;
  --correct: #1A6B3C;
  --correct-bg: #EAF5EF;
  --correct-border: #A3D4B8;
  --wrong: #B03030;
  --wrong-bg: #FAECEC;
  --wrong-border: #E8AAAA;
  --reveal: #7A5500;
  --reveal-bg: #FFF8E6;
  --reveal-border: #F0D080;
  --tag-network: #1A4F7A;
  --tag-network-bg: #E8F0F8;
  --tag-memory: #3D1A7A;
  --tag-memory-bg: #F0EBF8;
  --tag-number: #1A6B3C;
  --tag-number-bg: #EAF5EF;
  --tag-logic: #7A4A00;
  --tag-logic-bg: #FFF4E0;
  --tag-algorithm: #7A1A1A;
  --tag-algorithm-bg: #F8EAEA;
  --tag-coding: #1A5A6B;
  --tag-coding-bg: #E8F5F8;
  --tag-tf: #4A4A4A;
  --tag-tf-bg: #F0F0F0;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}

.logo-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
}

.logo-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 3px;
}

.sidebar-section {
  padding: 16px 20px 8px;
}

.sidebar-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  color: var(--text-secondary);
  font-size: 13px;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}

.nav-item:hover { background: var(--surface2); color: var(--text-primary); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }

.nav-count {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text-tertiary);
}

.nav-item.active .nav-count {
  background: var(--accent-mid);
  color: var(--accent);
}

.sidebar-stats {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  padding: 4px 0;
}

.stat-label { color: var(--text-secondary); }
.stat-val { font-weight: 600; color: var(--text-primary); }
.stat-val.correct { color: var(--correct); }
.stat-val.wrong { color: var(--wrong); }

/* ── MAIN CONTENT ── */
.main {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.search-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  flex: 1;
  max-width: 380px;
}

.search-wrap svg { color: var(--text-tertiary); flex-shrink: 0; }

.search-input {
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 14px;
  color: var(--text-primary);
  width: 100%;
  outline: none;
}

.search-input::placeholder { color: var(--text-tertiary); }

.filter-group {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.filter-btn {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  font-family: inherit;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}

.filter-btn:hover { background: var(--surface2); color: var(--text-primary); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.mode-toggle {
  display: flex;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}

.mode-btn {
  padding: 6px 14px;
  border-radius: 5px;
  border: none;
  background: transparent;
  font-size: 13px;
  font-family: inherit;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}

.mode-btn.active { background: var(--surface); color: var(--text-primary); box-shadow: var(--shadow); }

/* ── CONTENT AREA ── */
.content {
  padding: 28px 32px 48px;
  flex: 1;
}

.section-heading {
  margin-bottom: 20px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.section-heading h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.q-count-badge {
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 10px;
  border-radius: 20px;
}

/* ── QUESTION CARD ── */
.q-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow);
}

.q-card:hover { border-color: var(--border2); }

.q-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}

.q-number {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-tertiary);
  font-family: 'JetBrains Mono', monospace;
  min-width: 36px;
}

.q-text-preview {
  flex: 1;
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.5;
}

.q-text-preview code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--surface2);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 13px;
  color: var(--accent);
}

.q-tags {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
}

.tag-network { color: var(--tag-network); background: var(--tag-network-bg); }
.tag-memory { color: var(--tag-memory); background: var(--tag-memory-bg); }
.tag-number { color: var(--tag-number); background: var(--tag-number-bg); }
.tag-logic { color: var(--tag-logic); background: var(--tag-logic-bg); }
.tag-algorithm { color: var(--tag-algorithm); background: var(--tag-algorithm-bg); }
.tag-coding { color: var(--tag-coding); background: var(--tag-coding-bg); }
.tag-tf { color: var(--tag-tf); background: var(--tag-tf-bg); }
.tag-mcq { color: var(--accent); background: var(--accent-light); }

.q-chevron {
  color: var(--text-tertiary);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.q-card.open .q-chevron { transform: rotate(180deg); }

.q-card-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}

.q-card.open .q-card-body { display: block; }

.q-full-text {
  font-size: 15px;
  color: var(--text-primary);
  line-height: 1.65;
  padding: 14px 0 16px;
}

.q-full-text code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  color: var(--accent);
}

/* Options */
.options-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.option-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  color: var(--text-primary);
  text-align: left;
  line-height: 1.4;
  transition: all 0.15s;
}

.option-btn:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent-mid); }
.option-btn:disabled { cursor: default; }

.opt-letter {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s;
}

.option-btn.correct-pick { background: var(--correct-bg); border-color: var(--correct-border); }
.option-btn.correct-pick .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
.option-btn.correct-pick span:last-child { color: var(--correct); font-weight: 500; }

.option-btn.wrong-pick { background: var(--wrong-bg); border-color: var(--wrong-border); }
.option-btn.wrong-pick .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
.option-btn.wrong-pick span:last-child { color: var(--wrong); }

.option-btn.reveal { background: var(--reveal-bg); border-color: var(--reveal-border); }
.option-btn.reveal .opt-letter { background: var(--reveal); border-color: var(--reveal); color: #fff; }
.option-btn.reveal span:last-child { color: var(--reveal); font-weight: 500; }

/* True/False options */
.tf-options { display: flex; gap: 8px; margin-bottom: 14px; }
.tf-options .option-btn { flex: 1; justify-content: center; }

/* Feedback */
.feedback-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
}

.feedback-bar.correct { background: var(--correct-bg); color: var(--correct); border: 1px solid var(--correct-border); }
.feedback-bar.wrong { background: var(--wrong-bg); color: var(--wrong); border: 1px solid var(--wrong-border); }

.feedback-bar svg { flex-shrink: 0; }

/* Answered indicator */
.answered-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
}

.q-card[data-answered="correct"] .answered-dot { background: var(--correct); }
.q-card[data-answered="wrong"] .answered-dot { background: var(--wrong); }

/* ── QUIZ MODE ── */
.quiz-mode-wrap {
  display: none;
}

.quiz-mode-wrap.active { display: block; }
.browse-mode-wrap.hidden { display: none; }

.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 680px;
  margin: 0 auto;
  box-shadow: var(--shadow);
}

.quiz-progress {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
}

.quiz-progress-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.quiz-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.quiz-progress-text { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }

.quiz-q-tag { margin-bottom: 10px; }
.quiz-q-text { font-size: 17px; font-weight: 500; line-height: 1.6; margin-bottom: 24px; color: var(--text-primary); }
.quiz-q-text code { font-family: 'JetBrains Mono', monospace; background: var(--surface2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 14px; color: var(--accent); }

.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.quiz-option { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; font-size: 15px; font-family: inherit; color: var(--text-primary); text-align: left; line-height: 1.4; transition: all 0.15s; }
.quiz-option:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent-mid); }
.quiz-option:disabled { cursor: default; }
.quiz-option .opt-letter { width: 30px; height: 30px; font-size: 12px; }
.quiz-option.correct-pick { background: var(--correct-bg); border-color: var(--correct-border); }
.quiz-option.correct-pick .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
.quiz-option.wrong-pick { background: var(--wrong-bg); border-color: var(--wrong-border); }
.quiz-option.wrong-pick .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
.quiz-option.reveal { background: var(--reveal-bg); border-color: var(--reveal-border); }
.quiz-option.reveal .opt-letter { background: var(--reveal); border-color: var(--reveal); color: #fff; }

.quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.quiz-nav-btn { display: flex; align-items: center; gap: 6px; padding: 9px 18px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 14px; font-family: inherit; font-weight: 500; color: var(--text-primary); cursor: pointer; transition: all 0.15s; }
.quiz-nav-btn:hover:not(:disabled) { background: var(--surface2); }
.quiz-nav-btn:disabled { opacity: 0.35; cursor: default; }
.quiz-nav-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.quiz-nav-btn.primary:hover:not(:disabled) { background: #234d78; }

/* ── RESULTS CARD ── */
.results-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
  max-width: 680px;
  margin: 0 auto;
  text-align: center;
  box-shadow: var(--shadow);
}

.results-score { font-size: 64px; font-weight: 600; color: var(--text-primary); line-height: 1; }
.results-score-label { font-size: 15px; color: var(--text-secondary); margin-top: 8px; }
.results-grade { font-size: 18px; font-weight: 600; margin-top: 16px; }
.results-grade.excellent { color: var(--correct); }
.results-grade.good { color: #2B6CB0; }
.results-grade.pass { color: #7A5500; }
.results-grade.fail { color: var(--wrong); }

.results-breakdown {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 28px 0;
}

.rb-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 12px;
}

.rb-num { font-size: 28px; font-weight: 600; }
.rb-num.c { color: var(--correct); }
.rb-num.w { color: var(--wrong); }
.rb-num.s { color: var(--text-tertiary); }
.rb-lbl { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.restart-btn {
  padding: 11px 28px;
  border-radius: var(--radius-sm);
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 15px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}

.restart-btn:hover { background: #234d78; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-state svg { margin-bottom: 16px; color: var(--text-tertiary); }
.empty-state p { font-size: 14px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); }
  .sidebar-logo { flex: 1; }
  .sidebar-stats { margin-top: 0; border-top: none; border-left: 1px solid var(--border); }
  .content { padding: 20px 16px 40px; }
  .topbar { padding: 12px 16px; flex-wrap: wrap; }
  .search-wrap { max-width: 100%; flex: 1 1 100%; }
  .options-list { grid-template-columns: 1fr; }
}

@media (max-width: 580px) {
  .filter-group { display: none; }
  .quiz-card { padding: 20px; }
  .results-breakdown { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-tag">Mansoura University</div>
      <div class="logo-title">Intro. Computer Science</div>
      <div class="logo-sub">Question Bank — Gen 102</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Browse by topic</div>
      <div class="sidebar-nav" id="sidebar-nav">
        <button class="nav-item active" data-filter="all" onclick="filterTopic('all',this)">
          All Questions <span class="nav-count" id="cnt-all">0</span>
        </button>
        <button class="nav-item" data-filter="network" onclick="filterTopic('network',this)">
          Networks <span class="nav-count" id="cnt-network">0</span>
        </button>
        <button class="nav-item" data-filter="memory" onclick="filterTopic('memory',this)">
          Memory &amp; Storage <span class="nav-count" id="cnt-memory">0</span>
        </button>
        <button class="nav-item" data-filter="number" onclick="filterTopic('number',this)">
          Number Systems <span class="nav-count" id="cnt-number">0</span>
        </button>
        <button class="nav-item" data-filter="logic" onclick="filterTopic('logic',this)">
          Logic Operations <span class="nav-count" id="cnt-logic">0</span>
        </button>
        <button class="nav-item" data-filter="coding" onclick="filterTopic('coding',this)">
          Data Representation <span class="nav-count" id="cnt-coding">0</span>
        </button>
        <button class="nav-item" data-filter="algorithm" onclick="filterTopic('algorithm',this)">
          Algorithms <span class="nav-count" id="cnt-algorithm">0</span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Browse by type</div>
      <div class="sidebar-nav">
        <button class="nav-item" data-filter="mcq" onclick="filterTopic('mcq',this)">
          Multiple Choice <span class="nav-count" id="cnt-mcq">0</span>
        </button>
        <button class="nav-item" data-filter="tf" onclick="filterTopic('tf',this)">
          True / False <span class="nav-count" id="cnt-tf">0</span>
        </button>
      </div>
    </div>

    <div class="sidebar-stats">
      <div class="sidebar-section-label" style="margin-bottom:10px">Session stats</div>
      <div class="stat-row"><span class="stat-label">Answered</span><span class="stat-val" id="stat-answered">0</span></div>
      <div class="stat-row"><span class="stat-label">Correct</span><span class="stat-val correct" id="stat-correct">0</span></div>
      <div class="stat-row"><span class="stat-label">Wrong</span><span class="stat-val wrong" id="stat-wrong">0</span></div>
      <div class="stat-row"><span class="stat-label">Accuracy</span><span class="stat-val" id="stat-acc">—</span></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">

// ── STATE ──
let currentFilter = {topic:'all', answered:'all', search:''};
let currentMode = 'browse';
let answerMap = {};  // id -> 'correct' | 'wrong'
let quizPool = [];
let quizIdx = 0;
let quizAnswered = {};

// ── INIT ──
function init() {
  updateCounts();
  renderBrowse();
}

function updateCounts() {
  const topics = ['network','memory','number','logic','coding','algorithm'];
  document.getElementById('cnt-all').textContent = QUESTIONS.length;
  topics.forEach(t => {
    const el = document.getElementById('cnt-' + t);
    if(el) el.textContent = QUESTIONS.filter(q=>q.topic===t).length;
  });
  document.getElementById('cnt-mcq').textContent = QUESTIONS.filter(q=>q.type==='mcq').length;
  document.getElementById('cnt-tf').textContent = QUESTIONS.filter(q=>q.type==='tf').length;
}

function updateStats() {
  const answered = Object.keys(answerMap).length;
  const correct = Object.values(answerMap).filter(v=>v==='correct').length;
  const wrong = answered - correct;
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-acc').textContent = answered ? Math.round(correct/answered*100)+'%' : '—';
}

// ── FILTER / SEARCH ──
function filterTopic(topic, btn) {
  currentFilter.topic = topic;
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(currentMode === 'browse') renderBrowse();
}

function filterAnswered(type, btn) {
  currentFilter.answered = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBrowse();
}

function searchQuestions(val) {
  currentFilter.search = val.toLowerCase();
  renderBrowse();
}

function getFiltered() {
  return QUESTIONS.filter(q => {
    if(currentFilter.topic !== 'all' && currentFilter.topic !== 'mcq' && currentFilter.topic !== 'tf') {
      if(q.topic !== currentFilter.topic) return false;
    }
    if(currentFilter.topic === 'mcq' && q.type !== 'mcq') return false;
    if(currentFilter.topic === 'tf' && q.type !== 'tf') return false;
    if(currentFilter.answered === 'correct' && answerMap[q.id] !== 'correct') return false;
    if(currentFilter.answered === 'wrong' && answerMap[q.id] !== 'wrong') return false;
    if(currentFilter.answered === 'unanswered' && answerMap[q.id]) return false;
    if(currentFilter.search) {
      const plain = q.text.replace(/<[^>]+>/g,'').toLowerCase();
      if(!plain.includes(currentFilter.search)) return false;
    }
    return true;
  });
}

// ── BROWSE RENDER ──
function renderBrowse() {
  const qs = getFiltered();
  const grid = document.getElementById('q-grid');
  const empty = document.getElementById('empty-state');
  const countLabel = document.getElementById('q-count-label');
  const sectionTitle = document.getElementById('section-title');

  const topicNames = {all:'All Questions',network:'Networks',memory:'Memory & Storage',
    number:'Number Systems',logic:'Logic Operations',coding:'Data Representation',
    algorithm:'Algorithms',mcq:'Multiple Choice',tf:'True / False'};
  sectionTitle.textContent = topicNames[currentFilter.topic] || 'All Questions';
  countLabel.textContent = qs.length + ' question' + (qs.length!==1?'s':'');

  if(qs.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = qs.map((q, i) => buildCard(q, i+1)).join('');
  // restore open state
  qs.forEach(q => {
    const card = document.getElementById('qcard-'+q.id);
    if(!card) return;
    if(answerMap[q.id]) {
      card.setAttribute('data-answered', answerMap[q.id]);
    }
  });
}

function buildCard(q, num) {
  const tagMap = {network:'tag-network',memory:'tag-memory',number:'tag-number',logic:'tag-logic',coding:'tag-coding',algorithm:'tag-algorithm'};
  const tagLabel = {network:'Networks',memory:'Memory',number:'Numbers',logic:'Logic',coding:'Data Rep.',algorithm:'Algorithms'};
  const typeCls = q.type==='tf'?'tag-tf':'tag-mcq';
  const typeLabel = q.type==='tf'?'T/F':'MCQ';
  const answered = answerMap[q.id];

  let bodyHTML = '';
  if(q.type === 'mcq') {
    const letters = ['A','B','C','D'];
    const optsHTML = q.opts.map((o,j) => {
      let cls = '';
      if(answered) {
        if(j === q.ans) cls = answered==='wrong' ? 'reveal' : 'correct-pick';
        else if(answered==='wrong' && answerMap[q.id+'_sel']===j) cls = 'wrong-pick';
      }
      return `<button class="option-btn ${cls}" ${answered?'disabled':''} onclick="pickBrowse(${q.id},${j},${q.ans},this)">
        <span class="opt-letter">${letters[j]}</span><span>${o}</span>
      </button>`;
    }).join('');
    let fbHTML = '';
    if(answered) {
      fbHTML = answered==='correct'
        ? `<div class="feedback-bar correct"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> Correct!</div>`
        : `<div class="feedback-bar wrong"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg> Incorrect — correct answer is <strong>${letters[q.ans]}</strong>.</div>`;
    }
    bodyHTML = `<div class="q-full-text">${q.text}</div>
      <div class="options-list">${optsHTML}</div>
      ${fbHTML}`;
  } else {
    let tCls='', fCls='';
    if(answered) {
      if(q.ans===true) { tCls='correct-pick'; fCls=answerMap[q.id+'_sel']===false?'wrong-pick':''; }
      else { fCls='correct-pick'; tCls=answerMap[q.id+'_sel']===true?'wrong-pick':''; }
    }
    let fbHTML = '';
    if(answered) {
      fbHTML = answered==='correct'
        ? `<div class="feedback-bar correct"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> Correct!</div>`
        : `<div class="feedback-bar wrong"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg> Incorrect — the statement is <strong>${q.ans?'True':'False'}</strong>.</div>`;
    }
    bodyHTML = `<div class="q-full-text">${q.text}</div>
      <div class="tf-options">
        <button class="option-btn ${tCls}" ${answered?'disabled':''} onclick="pickBrowseTF(${q.id},true,${q.ans},this)">
          <span class="opt-letter">T</span><span>True</span>
        </button>
        <button class="option-btn ${fCls}" ${answered?'disabled':''} onclick="pickBrowseTF(${q.id},false,${q.ans},this)">
          <span class="opt-letter">F</span><span>False</span>
        </button>
      </div>
      ${fbHTML}`;
  }

  return `<div class="q-card" id="qcard-${q.id}" data-answered="${answered||''}">
    <div class="q-card-header" onclick="toggleCard(${q.id})">
      <span class="q-number">#${String(num).padStart(3,'0')}</span>
      <div class="answered-dot"></div>
      <div class="q-text-preview">${q.text}</div>
      <div class="q-tags">
        <span class="tag ${tagMap[q.topic]}">${tagLabel[q.topic]}</span>
        <span class="tag ${typeCls}">${typeLabel}</span>
      </div>
      <svg class="q-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="q-card-body">${bodyHTML}</div>
  </div>`;
}

function toggleCard(id) {
  const card = document.getElementById('qcard-'+id);
  if(card) card.classList.toggle('open');
}

function pickBrowse(qid, sel, ans, btn) {
  if(answerMap[qid]) return;
  const isCorrect = sel === ans;
  answerMap[qid] = isCorrect ? 'correct' : 'wrong';
  answerMap[qid+'_sel'] = sel;
  updateStats();
  const card = document.getElementById('qcard-'+qid);
  card.setAttribute('data-answered', answerMap[qid]);
  const q = QUESTIONS.find(q=>q.id===qid);
  const letters = ['A','B','C','D'];
  const opts = card.querySelectorAll('.option-btn');
  opts.forEach((b,j) => {
    b.disabled = true;
    b.classList.remove('correct-pick','wrong-pick','reveal');
    if(j===ans) b.classList.add(isCorrect?'correct-pick':'reveal');
    else if(j===sel && !isCorrect) b.classList.add('wrong-pick');
  });
  const body = card.querySelector('.q-card-body');
  let fb = body.querySelector('.feedback-bar');
  if(fb) fb.remove();
  const fbEl = document.createElement('div');
  fbEl.className = 'feedback-bar ' + (isCorrect?'correct':'wrong');
  fbEl.innerHTML = isCorrect
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> Correct!`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg> Incorrect — correct answer is <strong>${letters[ans]}</strong>.`;
  body.appendChild(fbEl);
}

function pickBrowseTF(qid, val, ans, btn) {
  if(answerMap[qid]) return;
  const isCorrect = val === ans;
  answerMap[qid] = isCorrect ? 'correct' : 'wrong';
  answerMap[qid+'_sel'] = val;
  updateStats();
  const card = document.getElementById('qcard-'+qid);
  card.setAttribute('data-answered', answerMap[qid]);
  const opts = card.querySelectorAll('.tf-options .option-btn');
  opts.forEach(b => {
    b.disabled = true;
    b.classList.remove('correct-pick','wrong-pick','reveal');
  });
  const trueBtn = opts[0], falseBtn = opts[1];
  if(ans === true) {
    trueBtn.classList.add('correct-pick');
    if(!isCorrect) falseBtn.classList.add('wrong-pick');
  } else {
    falseBtn.classList.add('correct-pick');
    if(!isCorrect) trueBtn.classList.add('wrong-pick');
  }
  const body = card.querySelector('.q-card-body');
  let fb = body.querySelector('.feedback-bar');
  if(fb) fb.remove();
  const fbEl = document.createElement('div');
  fbEl.className = 'feedback-bar ' + (isCorrect?'correct':'wrong');
  fbEl.innerHTML = isCorrect
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> Correct!`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg> Incorrect — the statement is <strong>${ans?'True':'False'}</strong>.`;
  body.appendChild(fbEl);
}

// ── MODE ──
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-browse').classList.toggle('active', mode==='browse');
  document.getElementById('mode-quiz').classList.toggle('active', mode==='quiz');
  document.getElementById('browse-wrap').classList.toggle('hidden', mode!=='browse');
  document.getElementById('quiz-wrap').classList.toggle('active', mode==='quiz');
  if(mode==='quiz') startQuiz();
}

// ── QUIZ MODE ──
function startQuiz() {
  const filtered = getFiltered();
  quizPool = shuffle([...filtered]);
  quizIdx = 0;
  quizAnswered = {};
  renderQuiz();
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function renderQuiz() {
  const wrap = document.getElementById('quiz-inner');
  if(quizPool.length === 0) {
    wrap.innerHTML = `<div class="quiz-card" style="text-align:center;padding:48px">
      <p style="color:var(--text-secondary);margin-bottom:16px">No questions available for the current filter.</p>
      <button class="restart-btn" onclick="setMode('browse')">Go to browse</button>
    </div>`;
    return;
  }
  if(quizIdx >= quizPool.length) {
    renderResults();
    return;
  }
  const q = quizPool[quizIdx];
  const pct = Math.round(quizIdx/quizPool.length*100);
  const tagMap = {network:'tag-network',memory:'tag-memory',number:'tag-number',logic:'tag-logic',coding:'tag-coding',algorithm:'tag-algorithm'};
  const tagLabel = {network:'Networks',memory:'Memory',number:'Numbers',logic:'Logic',coding:'Data Rep.',algorithm:'Algorithms'};

  let optionsHTML = '';
  if(q.type === 'mcq') {
    const letters = ['A','B','C','D'];
    optionsHTML = `<div class="quiz-options">` +
      q.opts.map((o,j)=>`<button class="quiz-option option-btn" onclick="quizPick(${q.id},${j},${q.ans},this)">
        <span class="opt-letter">${letters[j]}</span><span>${o}</span>
      </button>`).join('') + `</div>`;
  } else {
    optionsHTML = `<div class="quiz-options">
      <button class="quiz-option option-btn" onclick="quizPickTF(${q.id},true,${q.ans},this)">
        <span class="opt-letter">T</span><span>True</span>
      </button>
      <button class="quiz-option option-btn" onclick="quizPickTF(${q.id},false,${q.ans},this)">
        <span class="opt-letter">F</span><span>False</span>
      </button>
    </div>`;
  }

  wrap.innerHTML = `<div class="quiz-card">
    <div class="quiz-progress">
      <div class="quiz-progress-bar-wrap"><div class="quiz-progress-bar" style="width:${pct}%"></div></div>
      <span class="quiz-progress-text">${quizIdx+1} / ${quizPool.length}</span>
    </div>
    <div class="quiz-q-tag">
      <span class="tag ${tagMap[q.topic]}">${tagLabel[q.topic]}</span>
      <span class="tag ${q.type==='tf'?'tag-tf':'tag-mcq'}" style="margin-left:4px">${q.type==='tf'?'T/F':'MCQ'}</span>
    </div>
    <div class="quiz-q-text">${q.text}</div>
    ${optionsHTML}
    <div id="quiz-fb" style="margin-bottom:12px"></div>
    <div class="quiz-nav">
      <button class="quiz-nav-btn" onclick="quizPrev()" id="quiz-prev" ${quizIdx===0?'disabled':''}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg> Previous
      </button>
      <button class="quiz-nav-btn primary" onclick="quizNext()" id="quiz-next">
        ${quizIdx===quizPool.length-1?'See results':'Next'} <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
  </div>`;

  // Restore if already answered
  const qa = quizAnswered[q.id];
  if(qa) restoreQuizState(q, qa);
}

function quizPick(qid, sel, ans, btn) {
  if(quizAnswered[qid]) return;
  const isCorrect = sel === ans;
  quizAnswered[qid] = {sel, ans, correct: isCorrect, type:'mcq'};
  answerMap[qid] = isCorrect?'correct':'wrong';
  answerMap[qid+'_sel'] = sel;
  updateStats();
  const letters = ['A','B','C','D'];
  document.querySelectorAll('.quiz-option').forEach((b,j) => {
    b.disabled = true;
    if(j===ans) b.classList.add(isCorrect?'correct-pick':'reveal');
    else if(j===sel && !isCorrect) b.classList.add('wrong-pick');
  });
  showQuizFB(isCorrect, isCorrect?'':'Correct answer: '+letters[ans]);
}

function quizPickTF(qid, val, ans, btn) {
  if(quizAnswered[qid]) return;
  const isCorrect = val === ans;
  quizAnswered[qid] = {sel:val, ans, correct: isCorrect, type:'tf'};
  answerMap[qid] = isCorrect?'correct':'wrong';
  answerMap[qid+'_sel'] = val;
  updateStats();
  const btns = document.querySelectorAll('.quiz-option');
  btns.forEach(b => b.disabled = true);
  if(ans===true) {
    btns[0].classList.add('correct-pick');
    if(!isCorrect) btns[1].classList.add('wrong-pick');
  } else {
    btns[1].classList.add('correct-pick');
    if(!isCorrect) btns[0].classList.add('wrong-pick');
  }
  showQuizFB(isCorrect, isCorrect?'':'The statement is '+( ans?'True':'False' )+'.');
}

function showQuizFB(correct, extra) {
  const fb = document.getElementById('quiz-fb');
  if(!fb) return;
  fb.innerHTML = `<div class="feedback-bar ${correct?'correct':'wrong'}">
    ${correct
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> Correct!`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg> Incorrect. ${extra}`
    }
  </div>`;
}

function restoreQuizState(q, qa) {
  const btns = document.querySelectorAll('.quiz-option');
  btns.forEach(b=>b.disabled=true);
  if(qa.type==='mcq') {
    btns.forEach((b,j) => {
      if(j===qa.ans) b.classList.add(qa.correct?'correct-pick':'reveal');
      else if(j===qa.sel && !qa.correct) b.classList.add('wrong-pick');
    });
    const letters = ['A','B','C','D'];
    showQuizFB(qa.correct, qa.correct?'':'Correct answer: '+letters[qa.ans]);
  } else {
    if(qa.ans===true) {
      btns[0].classList.add('correct-pick');
      if(!qa.correct) btns[1].classList.add('wrong-pick');
    } else {
      btns[1].classList.add('correct-pick');
      if(!qa.correct) btns[0].classList.add('wrong-pick');
    }
    showQuizFB(qa.correct, qa.correct?'':'The statement is '+(qa.ans?'True':'False')+'.');
  }
}

function quizNext() {
  if(quizIdx < quizPool.length-1) { quizIdx++; renderQuiz(); }
  else renderResults();
}

function quizPrev() {
  if(quizIdx > 0) { quizIdx--; renderQuiz(); }
}

function renderResults() {
  const total = quizPool.length;
  const correct = Object.values(quizAnswered).filter(a=>a.correct).length;
  const wrong = Object.values(quizAnswered).filter(a=>!a.correct).length;
  const skipped = total - Object.keys(quizAnswered).length;
  const pct = Math.round(correct/total*100);
  const grade = pct>=90?'Excellent':pct>=75?'Very good':pct>=60?'Pass':'Needs review';
  const gradeCls = pct>=90?'excellent':pct>=75?'good':pct>=60?'pass':'fail';

  document.getElementById('quiz-inner').innerHTML = `<div class="results-card">
    <div class="results-score">${pct}%</div>
    <div class="results-score-label">${correct} correct out of ${total} questions</div>
    <div class="results-grade ${gradeCls}">${grade}</div>
    <div class="results-breakdown">
      <div class="rb-item"><div class="rb-num c">${correct}</div><div class="rb-lbl">Correct</div></div>
      <div class="rb-item"><div class="rb-num w">${wrong}</div><div class="rb-lbl">Wrong</div></div>
      <div class="rb-item"><div class="rb-num s">${skipped}</div><div class="rb-lbl">Skipped</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="restart-btn" onclick="startQuiz()">Retry quiz</button>
      <button class="restart-btn" style="background:var(--surface);color:var(--text-primary);border:1px solid var(--border)" onclick="setMode('browse')">Browse questions</button>
    </div>
  </div>`;
}

init();
</script>
</body>
</html>
